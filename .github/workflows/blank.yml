name: Hello World Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Hello World
        run: echo "hello world"

  goodbye:
    runs-on: ubuntu-latest

    steps:
      - name: Goodbye
        run: echo "goodbye"
